<svg width="1600" height="1040" viewBox="0 0 1600 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="84" y1="36" x2="1512" y2="1012" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFDFF"/>
      <stop offset="1" stop-color="#EDF5FF"/>
    </linearGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <linearGradient id="surface-soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCFEFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8FC4FF"/>
      <stop offset="1" stop-color="#5F9FF2"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="1040" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#88A7CB" flood-opacity="0.16"/>
    </filter>
    <filter id="shadow-soft" x="0" y="0" width="1600" height="1040" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#91AFD1" flood-opacity="0.1"/>
    </filter>
