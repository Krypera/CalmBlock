<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CalmBlock Debug</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="opt-shell">
      <header class="opt-hero">
        <h1>CalmBlock Debug</h1>
        <p>Local-only diagnostic view for advanced mode.</p>
      </header>
      <section id="debug-lock" class="opt-card hidden">
        <h2>Advanced mode required</h2>
        <p id="debug-lock-copy" class="muted">
          Advanced mode is currently off. Open settings, enable advanced mode, then reload this page.
        </p>
        <a href="options.html" target="_blank" rel="noreferrer">Open settings</a>
      </section>
      <section id="debug-panel" class="opt-card">
        <pre id="debug-output">Loading diagnostics...</pre>
      </section>
    </main>
    <script type="module" src="debug.js"></script>
  </body>
</html>
