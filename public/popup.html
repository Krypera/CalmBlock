<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CalmBlock</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="qb-shell">
      <header class="qb-header">
        <h1>CalmBlock</h1>
        <p>Strong privacy defaults, minimal fuss.</p>
      </header>
      <section class="qb-card">
        <div class="qb-row">
          <span>Global protection</span>
          <button id="global-toggle" class="qb-toggle" type="button"></button>
        </div>
        <div class="qb-row">
          <span>This site</span>
          <button id="site-toggle" class="qb-toggle" type="button"></button>
        </div>
        <p id="site-status" class="qb-status">Loading...</p>
      </section>
      <section class="qb-card">
        <div class="qb-stat">
          <span>Blocked on this page</span>
          <strong id="blocked-count">-</strong>
        </div>
        <div id="category-summary" class="qb-summary"></div>
      </section>
      <footer class="qb-footer">
        <p>No telemetry. No accounts. No remote code.</p>
        <a href="options.html" target="_blank" rel="noreferrer">Open settings</a>
      </footer>
      <p id="reload-hint" class="qb-hint hidden">Reload this tab to fully apply site changes.</p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
