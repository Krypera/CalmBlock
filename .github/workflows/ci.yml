name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Build Artifact Smoke Test
        run: npm run ci:smoke

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: calmblock-build-${{ github.sha }}
          path: |
            dist/chrome/**
            dist/firefox/**
