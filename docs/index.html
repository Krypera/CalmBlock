<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CalmBlock</title>
    <style>
      :root {
        --bg: #f3f8ff;
        --surface: #ffffff;
        --text: #1f2b38;
        --muted: #5f7386;
        --accent: #6aaef8;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
        color: var(--text);
      }
      main {
        max-width: 760px;
        margin: 40px auto;
        padding: 0 18px;
      }
      .card {
        background: var(--surface);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 26px rgba(88, 120, 155, 0.14);
      }
      h1 { margin: 0 0 8px; }
      p { color: var(--muted); line-height: 1.55; }
      a {
        color: #245e95;
        text-decoration: none;
        font-weight: 600;
      }
      .pill {
        display: inline-block;
        margin-top: 10px;
        background: #e9f4ff;
        color: #2c608f;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>CalmBlock</h1>
        <p>Privacy-first content blocking with calm defaults. No telemetry, no analytics, no remote code.</p>
        <p class="pill">Docs placeholder for future GitHub Pages</p>
        <p>
          Source of truth lives in
          <a href="https://github.com/Krypera/CalmBlock">the repository README</a>.
        </p>
      </section>
    </main>
  </body>
</html>
